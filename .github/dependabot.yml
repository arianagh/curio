version: 2

updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
    ignore:
      # pyproject.toml pins django==5.2.* deliberately (the LTS line) — don't
      # propose rewriting that pin to a non-LTS major (e.g. 6.0).
      - dependency-name: "django"
        update-types: ["version-update:semver-major"]
    labels: ["dependencies"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies"]

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies"]
