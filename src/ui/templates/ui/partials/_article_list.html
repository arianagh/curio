<table class="w-full text-sm">
  <tbody id="article-rows">
    {% for article in articles %}

        <td colspan="3" class="rounded-lg border border-dashed border-neutral-300 px-4 py-8 text-center text-sm text-neutral-500">

      </tr>
    {% endfor %}

</table>
